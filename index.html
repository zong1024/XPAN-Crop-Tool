<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#e94560">
    <meta name="description" content="XPAN 画幅裁剪工具 - 支持XPAN、电影等多种比例的批量裁剪">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="XPAN Crop">
    <title>XPAN 画幅裁剪工具</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>XPAN</h1>
            <p class="subtitle">PANORAMIC CROP TOOL</p>
        </header>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📷</div>
            <p>拖拽图片到这里或点击上传</p>
            <p class="upload-hint">支持批量上传 JPG、PNG、WebP 等格式</p>
            <input type="file" id="fileInput" accept="image/*" multiple hidden>
        </div>

        <div class="editor-container" id="editorContainer" style="display: none;">
            <div class="preview-section">
                <h3>SOURCE / ADJUSTMENT</h3>
                <div class="crop-container" id="cropContainer">
                    <img id="originalImage" src="" alt="原图">
                    <div class="crop-overlay" id="cropOverlay">
                        <div class="crop-area" id="cropArea"></div>
                    </div>
                </div>
                <div class="controls">
                    <div class="ratio-selector">
                        <label class="ratio-label">ASPECT RATIO</label>
                        <div class="ratio-options" id="ratioOptions">
                            <button class="ratio-btn active" data-ratio="2.71" data-name="XPAN">XPAN</button>
                            <button class="ratio-btn" data-ratio="2.39" data-name="2.39:1">2.39:1</button>
                            <button class="ratio-btn" data-ratio="2.35" data-name="2.35:1">2.35:1</button>
                            <button class="ratio-btn" data-ratio="1.85" data-name="1.85:1">1.85:1</button>
                            <button class="ratio-btn" data-ratio="1.90" data-name="1.90:1">1.90:1</button>
                            <button class="ratio-btn" data-ratio="1.43" data-name="1.43:1">1.43:1</button>
                        </div>
                    </div>
                    <label class="position-control">
                        <span>Y-POSITION</span>
                        <input type="range" id="verticalPosition" min="0" max="100" value="50">
                        <span id="positionValue">50%</span>
                    </label>
                </div>
            </div>

            <div class="result-section">
                <h3>XPAN / OUTPUT</h3>
                <div class="result-container">
                    <canvas id="resultCanvas"></canvas>
                </div>
                <div class="info-bar">
                    <span id="originalSize">SOURCE: -</span>
                    <span id="resultSize">OUTPUT: -</span>
                </div>
                <div class="action-buttons">
                    <button class="btn btn-primary" id="downloadBtn">DOWNLOAD</button>
                    <button class="btn btn-secondary" id="resetBtn">RESET</button>
                </div>
            </div>
        </div>

        <!-- 批量处理区域 -->
        <div class="batch-container" id="batchContainer" style="display: none;">
            <h3>BATCH QUEUE <span id="imageCount">(0)</span></h3>
            <div class="batch-controls">
                <div class="batch-ratio">
                    <label>ASPECT RATIO</label>
                    <div class="ratio-options" id="batchRatioOptions">
                        <button class="ratio-btn active" data-ratio="2.71" data-name="XPAN">XPAN</button>
                        <button class="ratio-btn" data-ratio="2.39" data-name="2.39:1">2.39:1</button>
                        <button class="ratio-btn" data-ratio="2.35" data-name="2.35:1">2.35:1</button>
                        <button class="ratio-btn" data-ratio="1.85" data-name="1.85:1">1.85:1</button>
                        <button class="ratio-btn" data-ratio="1.90" data-name="1.90:1">1.90:1</button>
                        <button class="ratio-btn" data-ratio="1.43" data-name="1.43:1">1.43:1</button>
                    </div>
                </div>
                <div class="batch-position">
                    <label>Y-POSITION (ALL)</label>
                    <input type="range" id="batchPosition" min="0" max="100" value="50">
                    <span id="batchPositionValue">50%</span>
                </div>
            </div>
            <div class="image-queue" id="imageQueue"></div>
            <div class="batch-actions">
                <button class="btn btn-primary" id="batchDownloadBtn">DOWNLOAD ALL (ZIP)</button>
                <button class="btn btn-secondary" id="addMoreBtn">+ ADD IMAGES</button>
                <button class="btn btn-danger" id="clearAllBtn">CLEAR ALL</button>
            </div>
        </div>

        <footer>
            <p>XPAN 是哈苏与富士合作生产的经典全景相机，画幅比例为 65:24</p>
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/piexifjs@1.0.6/piexif.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
